<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocked by Al HissN</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Watermark Background */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 15vw;
            color: rgba(255, 255, 255, 0.03);
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
            font-weight: 900;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 90%;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
            color: #ff4757;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 16px;
            color: #a4b0be;
            line-height: 1.5;
            margin: 0;
        }
        
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #57606f;
        }
    </style>
</head>
<body>
    <div class="watermark">AL HISSN</div>
    <div class="watermark" style="top: 20%; left: 20%;">PROTECTED</div>
    <div class="watermark" style="top: 80%; left: 80%;">BLOCKED</div>
    
    <div class="container">
        <div class="icon">🛡️</div>
        <h1>Access Denied</h1>
        <p>This Content is Blocked by Al HissN.</p>
        <div class="footer">Al HissN Shield is active to protect you from harmful content.</div>
    </div>
</body>
</html>
